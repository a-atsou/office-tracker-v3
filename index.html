<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>辦公室打卡 App</title>
  
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="color: #ef4444; background: #fee2e2; padding: 20px; margin: 20px; border-radius: 10px; font-family: monospace;"><b>System Crashed:</b><br><br>' + event.message + '</div>';
      }
    });
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#01a982', // Your specified green color
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slate-50 min-h-screen text-slate-800 font-sans overflow-x-hidden relative">
  
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-teal-100/60 blur-[100px] pointer-events-none"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] rounded-full bg-emerald-100/50 blur-[100px] pointer-events-none"></div>

  <div id="root" class="relative z-10 flex items-center justify-center min-h-screen p-6">
    <div style="text-align: center; color: #888;">
      <h2 style="font-size: 1.5rem;">Loading System...</h2>
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    // Google Form Configuration
    const GOOGLE_FORM_ID = '1FAIpQLSeSZI_SRvr8SGVWkiqegPiVUkIcMX1g1CiUnTiL_Qq7VeazkQ'; 
    const ENTRY_DATE_ID = 'entry.86024765'; 
    const ENTRY_ACTION_ID = 'entry.636253871'; 

    // Date Helper Functions
    const toLocalDateStr = (d) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
    const getTodayStr = () => toLocalDateStr(new Date());

    const getWeekDates = () => {
      const curr = new Date();
      const day = curr.getDay();
      const diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
      const monday = new Date(curr.setDate(diff));
      return Array.from({ length: 7 }).map((_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return toLocalDateStr(d);
      });
    };

    const getMonthDatesAndTarget = () => {
      const curr = new Date();
      const year = curr.getFullYear();
      const month = curr.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      let weekdaysCount = 0;
      const dates = [];

      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(year, month, i);
        const dateStr = toLocalDateStr(d);
        dates.push(dateStr);
        if (d.getDay() !== 0 && d.getDay() !== 6) weekdaysCount++;
      }
      const target = Math.ceil(weekdaysCount * 0.3);
      return { dates, target };
    };

    const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

    function OfficeTracker() {
      // State Management
      const [attendance, setAttendance] = useState(() => {
        const saved = localStorage.getItem('officeAttendance');
        return saved ? JSON.parse(saved) : {}; 
      });
      const [isCalendarExpanded, setIsCalendarExpanded] = useState(false);

      // Persist to LocalStorage
      useEffect(() => {
        localStorage.setItem('officeAttendance', JSON.stringify(attendance));
      }, [attendance]);

      const todayStr = getTodayStr();
      const weekDates = getWeekDates();
      const { dates: monthDates, target: monthlyTarget } = getMonthDatesAndTarget();
      
      const currentMonthPrefix = todayStr.substring(0, 7);
      const officeDaysThisMonth = Object.keys(attendance).filter(
        date => date.startsWith(currentMonthPrefix) && attendance[date]
      ).length;

      const progressPercentage = Math.min((officeDaysThisMonth / monthlyTarget) * 100, 100);
      const isGoalReached = officeDaysThisMonth >= monthlyTarget;
      const isLoggedToday = attendance[todayStr];

      // Handle Cloud Backup
      const logToGoogleForm = async (actionText, specificDateStr) => {
        if (!GOOGLE_FORM_ID) return;
        const formUrl = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
        const formData = new URLSearchParams();
        const d = new Date(specificDateStr);
        const displayDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${dayNames[d.getDay()===0 ? 6 : d.getDay()-1]})`;
        
        formData.append(ENTRY_DATE_ID, displayDate);
        formData.append(ENTRY_ACTION_ID, actionText);

        try {
          await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData });
        } catch (error) {
          console.error('Cloud backup failed:', error);
        }
      };

      // Toggle Attendance Status
      const handleToggleDate = (targetDateStr) => {
        setAttendance(prev => {
          const newState = { ...prev };
          const isCurrentlyLogged = newState[targetDateStr];
          const actionText = isCurrentlyLogged ? '撤銷打卡' : '紀錄進辦公室';
          
          if (isCurrentlyLogged) {
            delete newState[targetDateStr];
          } else {
            newState[targetDateStr] = true;
            
            // Fire Confetti with Brand Colors
            if (typeof confetti === 'function') {
              confetti({
                particleCount: 60,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#01a982', '#10b981', '#34d399']
              });
            }
          }
          
          logToGoogleForm(actionText, targetDateStr);
          return newState;
        });
      };

      // Render Individual Day Dot
      const renderDayDot = (dateStr, label) => {
        const isPastOrToday = dateStr <= todayStr;
        const isLogged = attendance[dateStr];
        const isToday = dateStr === todayStr;

        // Light Glassmorphism Dot Styles
        let dotStyle = "bg-white/60 border border-white shadow-sm hover:bg-white/90"; 
        if (isLogged) dotStyle = "bg-brand border-brand shadow-[0_4px_12px_rgba(1,169,130,0.3)]"; 
        else if (!isPastOrToday) dotStyle = "bg-white/30 border border-white/50"; 

        return (
          <div 
            key={dateStr} 
            onClick={() => isPastOrToday && handleToggleDate(dateStr)}
            className={`flex flex-col items-center space-y-1.5 ${isPastOrToday ? 'cursor-pointer hover:scale-110 active:scale-75 transition-all duration-300' : 'opacity-40'}`}
          >
            <span className={`text-[10px] font-bold tracking-wider ${isToday ? 'text-brand' : 'text-slate-400'}`}>{label}</span>
            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all duration-500 backdrop-blur-md ${dotStyle}`}>
              {isToday && !isLogged && <div className="w-2 h-2 bg-brand rounded-full animate-ping absolute shadow-sm"></div> }
              {isToday && !isLogged && <div className="w-2 h-2 bg-brand rounded-full relative"></div> }
              {isLogged && <svg className="w-4 h-4 text-white drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
            </div>
          </div>
        );
      };

      return (
        <div className="w-full max-w-md">
          
          {/* Main Light Glass Panel */}
          <div className="bg-white/70 backdrop-blur-2xl rounded-[2.5rem] shadow-[0_8px_32px_rgba(0,0,0,0.04)] p-8 border border-white relative overflow-hidden">
            
            {/* Header Section */}
            <div className="mb-8 text-center relative">
              <h1 className="text-2xl font-extrabold text-slate-800 tracking-wider mb-1">Office Progress</h1>
              <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Target: 30% Monthly</p>
            </div>

            {/* Progress Bar Section */}
            <div className="mb-8">
              <div className="flex justify-between text-sm mb-3 font-semibold text-slate-500">
                <span>Logged: <span className="text-slate-800 font-extrabold">{officeDaysThisMonth}</span> Days</span>
                <span>Goal: <span className="text-slate-800 font-extrabold">{monthlyTarget}</span> Days</span>
              </div>
              
              {/* Frosted Progress Track */}
              <div className="w-full bg-slate-200/50 backdrop-blur-sm rounded-full h-3 relative overflow-hidden shadow-inner">
                <div 
                  className="h-full rounded-full transition-all duration-1000 ease-out relative bg-brand shadow-[0_0_10px_rgba(1,169,130,0.4)]"
                  style={{ width: `${progressPercentage}%` }}
                >
                  {/* Highlight reflection */}
                  <div className="absolute top-0 left-0 right-0 bottom-0 bg-gradient-to-b from-white/30 to-transparent w-full h-full"></div>
                </div>
              </div>
              {isGoalReached && <p className="text-brand text-xs mt-3 text-center font-bold tracking-wider animate-pulse">🎉 GOAL REACHED</p>}
            </div>

            {/* Secondary Inner Glass Panel */}
            <div className="mb-8 bg-white/40 backdrop-blur-xl rounded-3xl p-5 border border-white shadow-[0_4px_16px_rgba(0,0,0,0.02)]">
              <div className="text-center mb-5">
                <span className="text-[10px] text-slate-400 font-bold tracking-widest uppercase">Tap to toggle status</span>
              </div>
              
              {/* Quick Week View */}
              <div className="flex justify-between items-center px-1">
                {weekDates.map((date, i) => renderDayDot(date, dayNames[i]))}
              </div>
              
              {/* Expanded Month View */}
              <div className={`transition-all duration-500 overflow-hidden ease-in-out ${isCalendarExpanded ? 'max-h-96 opacity-100 mt-6' : 'max-h-0 opacity-0'}`}>
                <div className="pt-6 border-t border-slate-200/50">
                  <p className="text-[10px] text-brand mb-4 font-bold text-center tracking-widest uppercase">Monthly Overview</p>
                  <div className="grid grid-cols-7 gap-y-4 gap-x-1">
                    {monthDates.map(date => {
                      const d = new Date(date);
                      return renderDayDot(date, d.getDate());
                    })}
                  </div>
                </div>
              </div>
              
              {/* Expand Toggle Button */}
              <button onClick={() => setIsCalendarExpanded(!isCalendarExpanded)} className="w-full mt-6 text-xs font-bold text-slate-400 hover:text-slate-600 flex justify-center items-center space-x-1 transition-colors">
                <span>{isCalendarExpanded ? 'COLLAPSE' : 'EXPAND'}</span>
                <svg className={`w-3 h-3 transition-transform duration-300 ${isCalendarExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>

            {/* Action Buttons */}
            <div className="space-y-4">
              <button 
                onClick={() => handleToggleDate(todayStr)}
                className={`w-full font-bold py-4 rounded-2xl transition-all duration-300 hover:scale-[1.02] active:scale-95 flex items-center justify-center space-x-2 border backdrop-blur-md ${
                  isLoggedToday 
                    ? 'bg-white/60 text-slate-500 border-white shadow-sm hover:bg-white/80' 
                    : 'bg-brand text-white border-brand shadow-[0_8px_20px_rgba(1,169,130,0.25)] hover:bg-brand/90'
                }`}
              >
                <span>{isLoggedToday ? '撤銷今天打卡' : '📍 紀錄今天進辦公室'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<OfficeTracker />);
  </script>
</body>
</html>
