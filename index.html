<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>辦公室打卡 App</title>
  
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="color: red; background: #fee2e2; padding: 20px; margin: 20px; border-radius: 10px; font-family: monospace;"><b>系統崩潰了：</b><br><br>' + event.message + '</div>';
      }
    });
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
</head>

<body class="bg-gradient-to-br from-indigo-200 via-purple-100 to-pink-200 min-h-screen text-gray-800">
  
  <div id="root">
    <div style="text-align: center; margin-top: 30vh; color: #888; font-family: sans-serif;">
      <h2 style="font-size: 1.5rem; margin-bottom: 10px;">系統載入中...</h2>
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const GOOGLE_FORM_ID = '1FAIpQLSeSZI_SRvr8SGVWkiqegPiVUkIcMX1g1CiUnTiL_Qq7VeazkQ'; 
    const ENTRY_DATE_ID = 'entry.86024765'; 
    const ENTRY_ACTION_ID = 'entry.636253871'; 

    const toLocalDateStr = (d) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
    const getTodayStr = () => toLocalDateStr(new Date());

    const getWeekDates = () => {
      const curr = new Date();
      const day = curr.getDay();
      const diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
      const monday = new Date(curr.setDate(diff));
      return Array.from({ length: 7 }).map((_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return toLocalDateStr(d);
      });
    };

    const getMonthDatesAndTarget = () => {
      const curr = new Date();
      const year = curr.getFullYear();
      const month = curr.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      let weekdaysCount = 0;
      const dates = [];

      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(year, month, i);
        const dateStr = toLocalDateStr(d);
        dates.push(dateStr);
        if (d.getDay() !== 0 && d.getDay() !== 6) weekdaysCount++;
      }
      const target = Math.ceil(weekdaysCount * 0.3);
      return { dates, target };
    };

    const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

    function OfficeTracker() {
      const [attendance, setAttendance] = useState(() => {
        const saved = localStorage.getItem('officeAttendance');
        return saved ? JSON.parse(saved) : {}; 
      });

      const [isCalendarExpanded, setIsCalendarExpanded] = useState(false);

      useEffect(() => {
        localStorage.setItem('officeAttendance', JSON.stringify(attendance));
      }, [attendance]);

      const todayStr = getTodayStr();
      const weekDates = getWeekDates();
      const { dates: monthDates, target: monthlyTarget } = getMonthDatesAndTarget();
      
      const currentMonthPrefix = todayStr.substring(0, 7);
      const officeDaysThisMonth = Object.keys(attendance).filter(
        date => date.startsWith(currentMonthPrefix) && attendance[date]
      ).length;

      const progressPercentage = Math.min((officeDaysThisMonth / monthlyTarget) * 100, 100);
      const isGoalReached = officeDaysThisMonth >= monthlyTarget;
      const isLoggedToday = attendance[todayStr];

      const logToGoogleForm = async (actionText, specificDateStr) => {
        if (!GOOGLE_FORM_ID) return;
        const formUrl = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
        const formData = new URLSearchParams();
        const d = new Date(specificDateStr);
        const displayDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${dayNames[d.getDay()===0 ? 6 : d.getDay()-1]})`;
        
        formData.append(ENTRY_DATE_ID, displayDate);
        formData.append(ENTRY_ACTION_ID, actionText);

        try {
          await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData });
        } catch (error) {
          console.error('Cloud backup failed:', error);
        }
      };

      const handleToggleDate = (targetDateStr) => {
        setAttendance(prev => {
          const newState = { ...prev };
          const isCurrentlyLogged = newState[targetDateStr];
          const actionText = isCurrentlyLogged ? '撤銷打卡' : '紀錄進辦公室';
          
          if (isCurrentlyLogged) {
            delete newState[targetDateStr];
          } else {
            newState[targetDateStr] = true;
            
            // ✨ 觸發灑花特效
            if (typeof confetti === 'function') {
              confetti({
                particleCount: 60,
                spread: 70,
                origin: { y: 0.8 },
                colors: ['#a78bfa', '#60a5fa', '#f472b6', '#34d399']
              });
            }
          }
          
          logToGoogleForm(actionText, targetDateStr);
          return newState;
        });
      };

      const renderDayDot = (dateStr, label) => {
        const isPastOrToday = dateStr <= todayStr;
        const isLogged = attendance[dateStr];
        const isToday = dateStr === todayStr;

        // ✨ 玻璃質感的圓點樣式
        let dotStyle = "border border-white/50 bg-white/20"; 
        if (isLogged) dotStyle = "bg-green-400/90 shadow-[0_0_15px_rgba(74,222,128,0.5)] border border-green-300"; 
        else if (isPastOrToday) dotStyle = "bg-white/40 border border-white/60 shadow-sm"; 

        return (
          <div 
            key={dateStr} 
            onClick={() => isPastOrToday && handleToggleDate(dateStr)}
            // 加入 active:scale-75 帶來 Q 彈手感
            className={`flex flex-col items-center space-y-1.5 ${isPastOrToday ? 'cursor-pointer hover:scale-110 active:scale-75 transition-transform duration-200' : 'opacity-40'}`}
          >
            <span className={`text-[10px] font-bold ${isToday ? 'text-indigo-600' : 'text-slate-500'}`}>{label}</span>
            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 backdrop-blur-sm ${dotStyle}`}>
              {isToday && !isLogged && <div className="w-2 h-2 bg-indigo-500 rounded-full animate-ping absolute"></div> }
              {isToday && !isLogged && <div className="w-2 h-2 bg-indigo-500 rounded-full relative"></div> }
              {isLogged && <svg className="w-4 h-4 text-white drop-shadow-md" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 font-sans">
          
          {/* ✨ 核心玻璃面板 (Glassmorphism) */}
          <div className="bg-white/40 backdrop-blur-xl rounded-[2.5rem] shadow-[0_8px_32px_0_rgba(31,38,135,0.1)] p-8 w-full max-w-md border border-white/60">
            
            <div className="mb-8 text-center relative">
              <h1 className="text-2xl font-extrabold text-slate-800 tracking-wide mb-1 drop-shadow-sm">本月辦公室進度</h1>
              <p className="text-slate-600 text-sm font-semibold">Policy: 月平均 30% 工作日</p>
            </div>

            <div className="mb-8">
              <div className="flex justify-between text-sm mb-2 font-bold text-slate-700">
                <span>本月已進：{officeDaysThisMonth} 天</span>
                <span>目標：{monthlyTarget} 天</span>
              </div>
              
              {/* ✨ 玻璃質感的進度條底框 */}
              <div className="w-full bg-white/50 backdrop-blur-sm rounded-full h-4 relative overflow-hidden shadow-inner border border-white/60">
                <div 
                  className={`h-full rounded-full transition-all duration-1000 ease-out relative ${isGoalReached ? 'bg-gradient-to-r from-green-300 to-emerald-400' : 'bg-gradient-to-r from-indigo-400 to-purple-400'}`}
                  style={{ width: `${progressPercentage}%` }}
                >
                  {/* 進度條反光特效 */}
                  <div className="absolute top-0 left-0 right-0 bottom-0 bg-white/20 w-full h-1/2 rounded-t-full"></div>
                </div>
              </div>
              {isGoalReached && <p className="text-emerald-600 text-xs mt-3 text-center font-bold animate-pulse">🎉 本月已達標！</p>}
            </div>

            {/* ✨ 半透明內嵌區塊 */}
            <div className="mb-8 bg-white/30 backdrop-blur-md rounded-3xl p-5 border border-white/50 shadow-[inset_0_2px_10px_rgba(255,255,255,0.6)]">
              <div className="text-center mb-4">
                <span className="text-[10px] text-slate-500 font-bold tracking-wider">💡 點擊圓點可直接補登或撤銷</span>
              </div>
              <div className="flex justify-between items-center px-1">
                {weekDates.map((date, i) => renderDayDot(date, dayNames[i]))}
              </div>
              <div className={`transition-all duration-500 overflow-hidden ease-in-out ${isCalendarExpanded ? 'max-h-96 opacity-100 mt-6' : 'max-h-0 opacity-0'}`}>
                <div className="pt-5 border-t border-white/50">
                  <p className="text-xs text-slate-500 mb-3 font-bold text-center tracking-widest">本月全覽</p>
                  <div className="grid grid-cols-7 gap-y-3 gap-x-1">
                    {monthDates.map(date => {
                      const d = new Date(date);
                      return renderDayDot(date, d.getDate());
                    })}
                  </div>
                </div>
              </div>
              <button onClick={() => setIsCalendarExpanded(!isCalendarExpanded)} className="w-full mt-5 text-xs font-bold text-slate-500 hover:text-slate-800 flex justify-center items-center space-x-1 transition-colors">
                <span>{isCalendarExpanded ? '收合月曆' : '展開本月'}</span>
                <svg className={`w-3 h-3 transition-transform duration-300 ${isCalendarExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>

            <div className="space-y-4">
              <button 
                onClick={() => handleToggleDate(todayStr)}
                // ✨ 立體果凍按鈕
                className={`w-full font-bold py-4 rounded-2xl shadow-lg transition-all hover:scale-[1.02] active:scale-95 flex items-center justify-center space-x-2 border ${
                  isLoggedToday 
                    ? 'bg-white/50 text-slate-700 border-white/60 hover:bg-white/70' 
                    : 'bg-slate-800/90 text-white border-slate-700 hover:bg-slate-900 backdrop-blur-md'
                }`}
              >
                <span>{isLoggedToday ? '撤銷今天打卡' : '📍 紀錄今天進辦公室'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<OfficeTracker />);
  </script>
</body>
</html>
