<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>辦公室打卡 App</title>
  
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="color: #ff8080; background: #2a0000; padding: 20px; margin: 20px; border-radius: 10px; font-family: monospace;"><b>System Crashed:</b><br><br>' + event.message + '</div>';
      }
    });
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#01a982', 
          }
        }
      }
    }
  </script>
</head>

<body class="bg-[#080d0b] min-h-screen text-gray-100 font-sans overflow-x-hidden">
  
  <div class="fixed top-[-10%] left-[-10%] w-[500px] h-[500px] rounded-full bg-brand/20 blur-[120px] pointer-events-none transform-gpu"></div>
  <div class="fixed bottom-[-10%] right-[-10%] w-[400px] h-[400px] rounded-full bg-brand/10 blur-[100px] pointer-events-none transform-gpu"></div>

  <div id="root" class="relative z-10 flex items-center justify-center min-h-screen p-6">
    <div style="text-align: center; color: #888;">
      <h2 style="font-size: 1.5rem;">Loading System...</h2>
    </div>
  </div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const GOOGLE_FORM_ID = '1FAIpQLSeSZI_SRvr8SGVWkiqegPiVUkIcMX1g1CiUnTiL_Qq7VeazkQ'; 
    const ENTRY_DATE_ID = 'entry.86024765'; 
    const ENTRY_ACTION_ID = 'entry.636253871'; 

    const toLocalDateStr = (d) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
    const getTodayStr = () => toLocalDateStr(new Date());

    const getWeekDates = () => {
      const curr = new Date();
      const day = curr.getDay();
      const diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
      const monday = new Date(curr.setDate(diff));
      return Array.from({ length: 7 }).map((_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return toLocalDateStr(d);
      });
    };

    const getMonthDatesAndTarget = () => {
      const curr = new Date();
      const year = curr.getFullYear();
      const month = curr.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      let weekdaysCount = 0;
      const dates = [];

      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(year, month, i);
        const dateStr = toLocalDateStr(d);
        dates.push(dateStr);
        if (d.getDay() !== 0 && d.getDay() !== 6) weekdaysCount++;
      }
      const target = Math.ceil(weekdaysCount * 0.3);
      return { dates, target };
    };

    const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

    function OfficeTracker() {
      const [attendance, setAttendance] = useState(() => {
        const saved = localStorage.getItem('officeAttendance');
        return saved ? JSON.parse(saved) : {}; 
      });
      const [isCalendarExpanded, setIsCalendarExpanded] = useState(false);

      useEffect(() => {
        localStorage.setItem('officeAttendance', JSON.stringify(attendance));
      }, [attendance]);

      const todayStr = getTodayStr();
      const weekDates = getWeekDates();
      const { dates: monthDates, target: monthlyTarget } = getMonthDatesAndTarget();
      
      const currentMonthPrefix = todayStr.substring(0, 7);
      const officeDaysThisMonth = Object.keys(attendance).filter(
        date => date.startsWith(currentMonthPrefix) && attendance[date]
      ).length;

      const progressPercentage = Math.min((officeDaysThisMonth / monthlyTarget) * 100, 100);
      const isGoalReached = officeDaysThisMonth >= monthlyTarget;
      const isLoggedToday = attendance[todayStr];

      const logToGoogleForm = async (actionText, specificDateStr) => {
        if (!GOOGLE_FORM_ID) return;
        const formUrl = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
        const formData = new URLSearchParams();
        const d = new Date(specificDateStr);
        const displayDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${dayNames[d.getDay()===0 ? 6 : d.getDay()-1]})`;
        
        formData.append(ENTRY_DATE_ID, displayDate);
        formData.append(ENTRY_ACTION_ID, actionText);

        try {
          await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData });
        } catch (error) {}
      };

      const handleToggleDate = (targetDateStr) => {
        setAttendance(prev => {
          const newState = { ...prev };
          const isCurrentlyLogged = newState[targetDateStr];
          const actionText = isCurrentlyLogged ? '撤銷打卡' : '紀錄進辦公室';
          
          if (isCurrentlyLogged) {
            delete newState[targetDateStr];
          } else {
            newState[targetDateStr] = true;
            
            setTimeout(() => {
              if (typeof confetti === 'function') {
                confetti({
                  particleCount: 50, 
                  spread: 70,
                  origin: { y: 0.8 },
                  colors: ['#01a982', '#fbbf24', '#ffffff'],
                  disableForReducedMotion: true
                });
              }
            }, 50);
          }
          
          logToGoogleForm(actionText, targetDateStr);
          return newState;
        });
      };

      const renderDayDot = (dateStr, label) => {
        const isPastOrToday = dateStr <= todayStr;
        const isLogged = attendance[dateStr];
        const isToday = dateStr === todayStr;

        let dotStyle = "bg-white/5 border border-white/10 shadow-inner"; 
        if (isLogged) dotStyle = "bg-amber-400 border border-amber-300 shadow-[0_0_15px_rgba(251,191,36,0.6)]"; 
        else if (isPastOrToday) dotStyle = "bg-black/40 border border-white/10 hover:bg-white/10"; 

        return (
          <div 
            key={dateStr} 
            onClick={() => isPastOrToday && handleToggleDate(dateStr)}
            className={`flex flex-col items-center space-y-1.5 ${isPastOrToday ? 'cursor-pointer hover:scale-110 active:scale-75 transition-transform duration-200 transform-gpu' : 'opacity-30'}`}
          >
            <span className={`text-[10px] font-bold tracking-wider ${isToday ? 'text-brand drop-shadow-[0_0_8px_rgba(1,169,130,0.8)]' : 'text-gray-400'}`}>{label}</span>
            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-colors duration-300 backdrop-blur-md ${dotStyle}`}>
              {isToday && !isLogged && <div className="w-2 h-2 bg-brand rounded-full animate-ping absolute shadow-[0_0_10px_rgba(1,169,130,1)]"></div> }
              {isToday && !isLogged && <div className="w-2 h-2 bg-brand rounded-full relative"></div> }
              {isLogged && <svg className="w-4 h-4 text-black drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
            </div>
          </div>
        );
      };

      return (
        <div className="w-full max-w-md">
          <div className="bg-white/5 backdrop-blur-3xl rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-8 border border-white/10 relative overflow-hidden">
            <div className="absolute top-0 left-1/4 w-1/2 h-px bg-gradient-to-r from-transparent via-white/30 to-transparent"></div>

            <div className="mb-8 text-center relative">
              <h1 className="text-2xl font-extrabold text-white tracking-wider mb-1">本月辦公室進度</h1>
              <p className="text-gray-400 text-xs font-semibold uppercase tracking-widest">Policy: 月平均 30% 工作日</p>
            </div>

            <div className="mb-8">
              <div className="flex justify-between text-sm mb-3 font-medium text-gray-300">
                <span>本月已進：<span className="text-white font-bold">{officeDaysThisMonth}</span> 天</span>
                <span>目標：<span className="text-white font-bold">{monthlyTarget}</span> 天</span>
              </div>
              
              <div className="w-full bg-black/50 backdrop-blur-sm rounded-full h-3 relative overflow-hidden border border-white/5 shadow-inner transform-gpu">
                <div 
                  className={`h-full rounded-full transition-[width,background-color] duration-1000 ease-out relative transform-gpu ${isGoalReached ? 'bg-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.6)]' : 'bg-brand shadow-[0_0_15px_rgba(1,169,130,0.6)]'}`}
                  style={{ width: `${progressPercentage}%` }}
                >
                  <div className="absolute top-0 left-0 right-0 bottom-0 bg-gradient-to-b from-white/30 to-transparent w-full h-full"></div>
                </div>
              </div>
              {isGoalReached && <p className="text-amber-400 text-xs mt-3 text-center font-bold tracking-wider animate-pulse">🎉 本月已達標！</p>}
            </div>

            <div className="mb-8 bg-black/20 backdrop-blur-xl rounded-3xl p-5 border border-white/5 shadow-[inset_0_2px_20px_rgba(0,0,0,0.5)] transform-gpu">
              <div className="text-center mb-5">
                <span className="text-[10px] text-gray-500 font-bold tracking-widest uppercase">💡 點擊圓點可直接補登或撤銷</span>
              </div>
              
              <div className="flex justify-between items-center px-1">
                {weekDates.map((date, i) => renderDayDot(date, dayNames[i]))}
              </div>
              
              {/* 🚀 效能優化核心：縮短時間為 300ms，拿掉 mt-6，強制 GPU 加速 */}
              <div className={`transition-all duration-300 ease-out transform-gpu overflow-hidden ${isCalendarExpanded ? 'max-h-[500px] opacity-100' : 'max-h-0 opacity-0'}`}>
                {/* 將外距塞入內部，避免展開時影響外部版面重繪 */}
                <div className="pt-6 mt-6 border-t border-white/10">
                  <p className="text-[10px] text-brand mb-4 font-bold text-center tracking-widest uppercase">本月全覽</p>
                  <div className="grid grid-cols-7 gap-y-4 gap-x-1">
                    {monthDates.map(date => {
                      const d = new Date(date);
                      return renderDayDot(date, d.getDate());
                    })}
                  </div>
                </div>
              </div>
              
              <button onClick={() => setIsCalendarExpanded(!isCalendarExpanded)} className="w-full mt-6 text-xs font-bold text-gray-500 hover:text-white flex justify-center items-center space-x-1 transition-colors">
                <span>{isCalendarExpanded ? '收合月曆' : '展開本月'}</span>
                <svg className={`w-3 h-3 transition-transform duration-300 transform-gpu ${isCalendarExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>

            <div className="space-y-4">
              <button 
                onClick={() => handleToggleDate(todayStr)}
                className={`w-full font-bold py-4 rounded-2xl transition-[transform,background-color,border-color] duration-200 hover:scale-[1.02] active:scale-95 flex items-center justify-center space-x-2 border backdrop-blur-md transform-gpu ${
                  isLoggedToday 
                    ? 'bg-white/5 text-gray-400 border-white/10 hover:bg-white/10' 
                    : 'bg-brand text-white border-brand/50 hover:bg-brand/80 shadow-[0_0_20px_rgba(1,169,130,0.3)]'
                }`}
              >
                <span>{isLoggedToday ? '撤銷今天打卡' : '📍 紀錄今天進辦公室'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<OfficeTracker />);
  </script>
</body>
</html>
