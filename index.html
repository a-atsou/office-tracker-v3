<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>辦公室打卡 App</title>
  
  <script>
    window.addEventListener('error', function(event) {
      const root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="color: #ff8080; background: #2a0000; padding: 20px; margin: 20px; border-radius: 10px; font-family: monospace;"><b>System Crashed:</b><br><br>' + event.message + '</div>';
      }
    });
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: '#01a982',
          },
          fontFamily: {
            sans: ['-apple-system', 'BlinkMacSystemFont', '"SF Pro Text"', '"SF Pro Display"', '"Helvetica Neue"', 'sans-serif'],
          },
        }
      }
    }
  </script>

  <style>
    /* ---- True Liquid Glass material ---- */
    .liquid-glass {
      position: relative;
      background: linear-gradient(135deg, rgba(255,255,255,0.42) 0%, rgba(255,255,255,0.12) 45%, rgba(255,255,255,0.22) 100%);
      -webkit-backdrop-filter: blur(28px) saturate(190%) brightness(1.08);
      backdrop-filter: blur(28px) saturate(190%) brightness(1.08);
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow:
        0 12px 40px rgba(30,41,59,0.14),
        inset 0 1px 1px rgba(255,255,255,0.95),
        inset 0 -12px 20px -12px rgba(255,255,255,0.3),
        inset 0 0 0 1px rgba(255,255,255,0.08);
    }
    .liquid-glass::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(160deg, rgba(255,255,255,0.9), rgba(255,255,255,0) 30%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.5));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-sm {
      background: linear-gradient(135deg, rgba(255,255,255,0.35) 0%, rgba(255,255,255,0.08) 100%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.5);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.9), inset 0 -6px 10px -6px rgba(255,255,255,0.25), 0 3px 10px rgba(30,41,59,0.08);
    }
    /* Lightweight glass look with NO backdrop-filter — used for the many small day-dots.
       Blurring 30+ elements at once during the accordion animation was the main cause of jank. */
    .glass-chip {
      background: linear-gradient(135deg, rgba(255,255,255,0.65) 0%, rgba(255,255,255,0.28) 100%);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.9), inset 0 -4px 8px -4px rgba(255,255,255,0.3), 0 2px 6px rgba(30,41,59,0.06);
    }
    .liquid-solid {
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.7), inset 0 -3px 8px rgba(0,0,0,0.12), 0 6px 18px -4px var(--glow, rgba(1,169,130,0.5));
      border: 1px solid rgba(255,255,255,0.45);
    }
  </style>
</head>

<body class="min-h-screen text-gray-900 font-sans overflow-x-hidden">

  <div class="fixed inset-0 -z-10 bg-cover bg-center bg-no-repeat" style="background-image: url('bg.jpg');"></div>
  <div class="fixed inset-0 -z-10 bg-white/10"></div>

  <div id="root" class="relative z-10 flex items-center justify-center min-h-screen p-6">
    <div style="text-align: center; color: #94a3b8;">
      <h2 style="font-size: 1.5rem;">Loading System...</h2>
    </div>
  </div>



  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const GOOGLE_FORM_ID = '1FAIpQLSeSZI_SRvr8SGVWkiqegPiVUkIcMX1g1CiUnTiL_Qq7VeazkQ'; 
    const ENTRY_DATE_ID = 'entry.86024765'; 
    const ENTRY_ACTION_ID = 'entry.636253871'; 

    const toLocalDateStr = (d) => new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
    const getTodayStr = () => toLocalDateStr(new Date());

    // 🗓️ 改為「星期日」為第一天的邏輯
    const getWeekDates = () => {
      const curr = new Date();
      const day = curr.getDay(); // JavaScript 的 0 就是星期日
      const diff = curr.getDate() - day; // 直接扣掉星期幾，就會回到星期日
      const sunday = new Date(curr.setDate(diff));
      return Array.from({ length: 7 }).map((_, i) => {
        const d = new Date(sunday);
        d.setDate(sunday.getDate() + i);
        return toLocalDateStr(d);
      });
    };

    // 🗓️ 加入「空白佔位符」邏輯，讓月曆 1 號對齊正確的星期幾
    const getMonthDatesAndTarget = () => {
      const curr = new Date();
      const year = curr.getFullYear();
      const month = curr.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfMonth = new Date(year, month, 1).getDay(); // 這個月的第一天是星期幾 (0-6)
      
      let weekdaysCount = 0;
      const dates = [];

      // 補上月初的空白天數，讓月曆完美對齊
      for (let i = 0; i < firstDayOfMonth; i++) {
        dates.push(null);
      }

      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(year, month, i);
        const dateStr = toLocalDateStr(d);
        dates.push(dateStr);
        if (d.getDay() !== 0 && d.getDay() !== 6) weekdaysCount++;
      }
      const target = Math.ceil(weekdaysCount * 0.3);
      return { dates, target };
    };

    // 🗓️ 陣列改為星期日開頭
    const dayNames = ['日', '一', '二', '三', '四', '五', '六'];

    function OfficeTracker() {
      const [attendance, setAttendance] = useState(() => {
        const saved = localStorage.getItem('officeAttendance');
        return saved ? JSON.parse(saved) : {}; 
      });
      const [isCalendarExpanded, setIsCalendarExpanded] = useState(false);

      useEffect(() => {
        localStorage.setItem('officeAttendance', JSON.stringify(attendance));
      }, [attendance]);

      const todayStr = getTodayStr();
      const weekDates = getWeekDates();
      const { dates: monthDates, target: monthlyTarget } = getMonthDatesAndTarget();
      
      const currentMonthPrefix = todayStr.substring(0, 7);
      const officeDaysThisMonth = Object.keys(attendance).filter(
        date => date.startsWith(currentMonthPrefix) && attendance[date]
      ).length;

      const progressPercentage = Math.min((officeDaysThisMonth / monthlyTarget) * 100, 100);
      const isGoalReached = officeDaysThisMonth >= monthlyTarget;
      const isLoggedToday = attendance[todayStr];

      const logToGoogleForm = async (actionText, specificDateStr) => {
        if (!GOOGLE_FORM_ID) return;
        const formUrl = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
        const formData = new URLSearchParams();
        const d = new Date(specificDateStr);
        
        // 🗓️ 傳送到 Google 表單的時間標籤也同步簡化為新的 dayNames 對應
        const displayDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${dayNames[d.getDay()]})`;
        
        formData.append(ENTRY_DATE_ID, displayDate);
        formData.append(ENTRY_ACTION_ID, actionText);

        try {
          await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData });
        } catch (error) {}
      };

      const handleToggleDate = (targetDateStr) => {
        setAttendance(prev => {
          const newState = { ...prev };
          const isCurrentlyLogged = newState[targetDateStr];
          const actionText = isCurrentlyLogged ? '撤銷打卡' : '紀錄進辦公室';
          
          if (isCurrentlyLogged) {
            delete newState[targetDateStr];
          } else {
            newState[targetDateStr] = true;
            
            setTimeout(() => {
              if (typeof confetti === 'function') {
                confetti({
                  particleCount: 50, 
                  spread: 70,
                  origin: { y: 0.8 },
                  colors: ['#01a982', '#fbbf24', '#ffffff'],
                  disableForReducedMotion: true
                });
              }
            }, 50);
          }
          
          logToGoogleForm(actionText, targetDateStr);
          return newState;
        });
      };

      const renderDayDot = (dateStr, label) => {
        const isPastOrToday = dateStr <= todayStr;
        const isLogged = attendance[dateStr];
        const isToday = dateStr === todayStr;

        let dotClass = "glass-chip";
        let dotStyle = {};
        if (isLogged) {
          dotClass = "liquid-solid";
          dotStyle = { background: 'linear-gradient(135deg, #14caa0, #01a982 60%, #018a6c)', '--glow': 'rgba(1,169,130,0.55)' };
        } else if (isPastOrToday) {
          dotClass = "glass-chip hover:brightness-110";
        } else {
          dotClass = "glass-chip opacity-50";
        }

        return (
          <div 
            key={dateStr} 
            onClick={() => isPastOrToday && handleToggleDate(dateStr)}
            className={`flex flex-col items-center space-y-1.5 ${isPastOrToday ? 'cursor-pointer hover:scale-110 active:scale-75 transition-transform duration-200 transform-gpu' : ''}`}
          >
            <span className={`text-[10px] font-bold tracking-wider ${isToday ? 'text-brand' : 'text-slate-500'}`}>{label}</span>
            <div style={dotStyle} className={`w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 transform-gpu ${dotClass}`}>
              {isToday && !isLogged && <div className="w-2 h-2 bg-brand rounded-full animate-ping absolute shadow-[0_0_10px_rgba(1,169,130,0.7)]"></div> }
              {isToday && !isLogged && <div className="w-2 h-2 bg-brand rounded-full relative"></div> }
              {isLogged && <svg className="w-4 h-4 text-white drop-shadow-sm" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
            </div>
          </div>
        );
      };

      return (
        <div className="w-full max-w-md">
          <div className="liquid-glass rounded-[2.75rem] p-8 relative">

            <div className="mb-8 text-center relative">
              <h1 className="text-2xl font-extrabold text-slate-800 tracking-wider mb-1 drop-shadow-[0_1px_0_rgba(255,255,255,0.6)]">本月辦公室進度</h1>
              <p className="text-slate-600 text-xs font-semibold uppercase tracking-widest">Policy: 月平均 30% 工作日</p>
            </div>

            <div className="mb-8">
              <div className="flex justify-between text-sm mb-3 font-medium text-slate-600">
                <span>本月已進：<span className="text-slate-800 font-bold">{officeDaysThisMonth}</span> 天</span>
                <span>目標：<span className="text-slate-800 font-bold">{monthlyTarget}</span> 天</span>
              </div>
              
              <div className="liquid-glass-sm w-full rounded-full h-3 relative overflow-hidden transform-gpu">
                <div 
                  className={`h-full rounded-full transition-[width,background-color] duration-1000 ease-out relative transform-gpu liquid-solid ${isGoalReached ? '' : ''}`}
                  style={{ width: `${progressPercentage}%`, background: isGoalReached ? 'linear-gradient(135deg, #fde08a, #fbbf24 60%, #f59e0b)' : 'linear-gradient(135deg, #14caa0, #01a982 60%, #018a6c)' }}
                >
                </div>
              </div>
              {isGoalReached && <p className="text-amber-500 text-xs mt-3 text-center font-bold tracking-wider animate-pulse">🎉 本月已達標！</p>}
            </div>

            <div className="mb-8 liquid-glass-sm rounded-[2rem] p-5 transform-gpu">
              <div className="text-center mb-5">
                <span className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">💡 點擊圓點可直接補登或撤銷</span>
              </div>
              
              <div className="flex justify-between items-center px-1">
                {weekDates.map((date, i) => renderDayDot(date, dayNames[i]))}
              </div>
              
              <div className={`grid transition-[grid-template-rows] duration-300 ease-out ${isCalendarExpanded ? 'grid-rows-[1fr]' : 'grid-rows-[0fr]'}`}>
                <div className="overflow-hidden min-h-0">
                  <div className="pt-6 mt-6 border-t border-white/50">
                    <p className="text-[10px] text-brand mb-4 font-bold text-center tracking-widest uppercase">本月全覽</p>
                    <div className="grid grid-cols-7 gap-y-4 gap-x-1">
                      {monthDates.map((date, idx) => {
                        // 🗓️ 處理月初的空白格子，確保 1 號對齊正確的星期
                        if (!date) return <div key={`empty-${idx}`} className="w-8 h-8 mx-auto" />;
                        
                        const d = new Date(date);
                        return renderDayDot(date, d.getDate());
                      })}
                    </div>
                  </div>
                </div>
              </div>
              
              <button onClick={() => setIsCalendarExpanded(!isCalendarExpanded)} className="w-full mt-6 text-xs font-bold text-slate-500 hover:text-slate-800 flex justify-center items-center space-x-1 transition-colors">
                <span>{isCalendarExpanded ? '收合月曆' : '展開本月'}</span>
                <svg className={`w-3 h-3 transition-transform duration-300 transform-gpu ${isCalendarExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>

            <div className="space-y-4">
              <button 
                onClick={() => handleToggleDate(todayStr)}
                style={isLoggedToday ? {} : { background: 'linear-gradient(135deg, #14caa0, #01a982 55%, #018a6c)', '--glow': 'rgba(1,169,130,0.5)' }}
                className={`w-full font-bold py-4 rounded-[1.75rem] transition-[transform] duration-200 hover:scale-[1.02] active:scale-95 flex items-center justify-center space-x-2 transform-gpu ${
                  isLoggedToday 
                    ? 'liquid-glass-sm text-slate-600' 
                    : 'liquid-solid text-white'
                }`}
              >
                <span>{isLoggedToday ? '撤銷今天打卡' : '📍 紀錄今天進辦公室'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<OfficeTracker />);
  </script>
</body>
</html>
