<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>辦公室打卡 App</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==================== Google 表單設定 ====================
    const GOOGLE_FORM_ID = '1FAIpQLSeSZI_SRvr8SGVWkiqegPiVUkIcMX1g1CiUnTiL_Qq7VeazkQ'; 
    const ENTRY_DATE_ID = 'entry.86024765'; 
    const ENTRY_ACTION_ID = 'entry.636253871'; 
    // =========================================================

    const toLocalDateStr = (d) => {
      return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().split('T')[0];
    };

    const getTodayStr = () => toLocalDateStr(new Date());

    const getWeekDates = () => {
      const curr = new Date();
      const day = curr.getDay();
      const diff = curr.getDate() - day + (day === 0 ? -6 : 1); 
      const monday = new Date(curr.setDate(diff));
      return Array.from({ length: 7 }).map((_, i) => {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        return toLocalDateStr(d);
      });
    };

    const getMonthDatesAndTarget = () => {
      const curr = new Date();
      const year = curr.getFullYear();
      const month = curr.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      
      let weekdaysCount = 0;
      const dates = [];

      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(year, month, i);
        const dateStr = toLocalDateStr(d);
        dates.push(dateStr);
        if (d.getDay() !== 0 && d.getDay() !== 6) weekdaysCount++;
      }
      const target = Math.ceil(weekdaysCount * 0.3);
      return { dates, target };
    };

    const dayNames = ['一', '二', '三', '四', '五', '六', '日'];

    function OfficeTracker() {
      const [attendance, setAttendance] = useState(() => {
        const saved = localStorage.getItem('officeAttendance');
        return saved ? JSON.parse(saved) : {}; 
      });

      const [isCalendarExpanded, setIsCalendarExpanded] = useState(false);

      useEffect(() => {
        localStorage.setItem('officeAttendance', JSON.stringify(attendance));
      }, [attendance]);

      const todayStr = getTodayStr();
      const weekDates = getWeekDates();
      const { dates: monthDates, target: monthlyTarget } = getMonthDatesAndTarget();
      
      const currentMonthPrefix = todayStr.substring(0, 7);
      const officeDaysThisMonth = Object.keys(attendance).filter(
        date => date.startsWith(currentMonthPrefix) && attendance[date]
      ).length;

      const progressPercentage = Math.min((officeDaysThisMonth / monthlyTarget) * 100, 100);
      const isGoalReached = officeDaysThisMonth >= monthlyTarget;
      const isLoggedToday = attendance[todayStr];

      const logToGoogleForm = async (actionText, specificDateStr) => {
        if (!GOOGLE_FORM_ID) return;
        const formUrl = `https://docs.google.com/forms/d/e/${GOOGLE_FORM_ID}/formResponse`;
        const formData = new URLSearchParams();
        const d = new Date(specificDateStr);
        const displayDate = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} (${dayNames[d.getDay()===0 ? 6 : d.getDay()-1]})`;
        
        formData.append(ENTRY_DATE_ID, displayDate);
        formData.append(ENTRY_ACTION_ID, actionText);

        try {
          await fetch(formUrl, { method: 'POST', mode: 'no-cors', body: formData });
        } catch (error) {
          console.error('Cloud backup failed:', error);
        }
      };

      const handleToggleDate = (targetDateStr) => {
        setAttendance(prev => {
          const newState = { ...prev };
          const isCurrentlyLogged = newState[targetDateStr];
          const actionText = isCurrentlyLogged ? '撤銷打卡' : '紀錄進辦公室';
          
          if (isCurrentlyLogged) delete newState[targetDateStr];
          else newState[targetDateStr] = true;
          
          logToGoogleForm(actionText, targetDateStr);
          return newState;
        });
      };

      const renderDayDot = (dateStr, label) => {
        const isPastOrToday = dateStr <= todayStr;
        const isLogged = attendance[dateStr];
        const isToday = dateStr === todayStr;

        let dotStyle = "border-2 border-gray-200 bg-transparent"; 
        if (isLogged) dotStyle = "bg-green-400 shadow-sm border-2 border-green-400"; 
        else if (isPastOrToday) dotStyle = "bg-gray-100 border-2 border-gray-200"; 

        return (
          <div 
            key={dateStr} 
            onClick={() => isPastOrToday && handleToggleDate(dateStr)}
            className={`flex flex-col items-center space-y-1.5 ${isPastOrToday ? 'cursor-pointer hover:scale-110 transition-transform' : 'opacity-50'}`}
          >
            <span className={`text-[10px] font-medium ${isToday ? 'text-blue-500' : 'text-gray-400'}`}>{label}</span>
            <div className={`w-8 h-8 rounded-full flex items-center justify-center transition-all duration-300 ${dotStyle}`}>
              {isToday && !isLogged && <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse" /> }
              {isLogged && <svg className="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" /></svg>}
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-gray-50 flex items-center justify-center p-6 font-sans">
          <div className="bg-white rounded-[2rem] shadow-xl p-8 w-full max-w-md border border-gray-100">
            <div className="mb-8 text-center relative">
              <h1 className="text-2xl font-bold text-gray-800 tracking-wide mb-1">本月辦公室進度</h1>
              <p className="text-gray-400 text-sm font-medium">Policy: 月平均 30% 工作日</p>
            </div>

            <div className="mb-8">
              <div className="flex justify-between text-sm mb-2 font-medium">
                <span className="text-gray-600">本月已進：{officeDaysThisMonth} 天</span>
                <span className="text-gray-600">目標：{monthlyTarget} 天</span>
              </div>
              <div className="w-full bg-gray-100 rounded-full h-3.5 relative overflow-hidden shadow-inner">
                <div 
                  className={`h-full rounded-full transition-all duration-700 ease-out ${isGoalReached ? 'bg-green-400 shadow-[0_0_10px_rgba(74,222,128,0.5)]' : 'bg-blue-500'}`}
                  style={{ width: `${progressPercentage}%` }}
                ></div>
              </div>
              {isGoalReached && <p className="text-green-500 text-xs mt-3 text-center font-semibold animate-pulse">🎉 本月已達標！</p>}
            </div>

            <div className="mb-8 bg-gray-50/50 rounded-3xl p-4 border border-gray-100">
              <div className="text-center mb-3">
                <span className="text-[10px] text-gray-400 font-medium">💡 點擊圓點可直接補登或撤銷</span>
              </div>
              <div className="flex justify-between items-center px-1">
                {weekDates.map((date, i) => renderDayDot(date, dayNames[i]))}
              </div>
              <div className={`transition-all duration-500 overflow-hidden ease-in-out ${isCalendarExpanded ? 'max-h-96 opacity-100 mt-6' : 'max-h-0 opacity-0'}`}>
                <div className="pt-4 border-t border-gray-200/60">
                  <p className="text-xs text-gray-400 mb-3 font-medium text-center">本月全覽</p>
                  <div className="grid grid-cols-7 gap-2">
                    {monthDates.map(date => {
                      const d = new Date(date);
                      return renderDayDot(date, d.getDate());
                    })}
                  </div>
                </div>
              </div>
              <button onClick={() => setIsCalendarExpanded(!isCalendarExpanded)} className="w-full mt-4 text-xs font-medium text-gray-400 hover:text-gray-600 flex justify-center items-center space-x-1">
                <span>{isCalendarExpanded ? '收合月曆' : '展開本月'}</span>
                <svg className={`w-3 h-3 transition-transform duration-300 ${isCalendarExpanded ? 'rotate-180' : ''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7" /></svg>
              </button>
            </div>

            <div className="space-y-4">
              <button 
                onClick={() => handleToggleDate(todayStr)}
                className={`w-full font-semibold py-3.5 rounded-2xl shadow-md transition-all active:scale-95 flex items-center justify-center space-x-2 ${isLoggedToday ? 'bg-gray-100 text-gray-600 hover:bg-gray-200' : 'bg-black text-white hover:bg-gray-800'}`}
              >
                <span>{isLoggedToday ? '撤銷今天打卡' : '📍 紀錄今天進辦公室'}</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OfficeTracker />);
  </script>
</body>
</html>
